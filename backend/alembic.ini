# Alembic Configuration for DataCure

[alembic]
# path to migration scripts
sqlalchemy.url =

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with an ordering prefix
# file_template = %%(rev)d_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# as a list of strings
# prepend_sys_path = .

# timezone to use when rendering the migration date
# and time with utcnow. Set to string 'local' to use local
# timezone in migrations.py
# timezone =

# max length of characters to apply to the
# "slug" field that's appended to a revision file
# you might want to set this to 40 to avoid too long filenames, since
# default is 40 already
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to detect a new table that as only a
# foreign key to an existing table, as a "move" operation
# as opposed to a "create_table" operation. This may be
# useful for certain databases or operations. However it
# is currently an experimental feature so use at your own
# risk
# detect_changes = false

# Logging configuration
# Uncomment and set to logging config file
# log_file = alembic.log
# log_level = INFO

[loggers]
keys = sqlalchemy.engine,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
